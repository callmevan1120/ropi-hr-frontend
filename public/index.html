<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Portal - Login Roti Ropi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rotiBrown: '#3e2723', rotiYellow: '#fbc02d', rotiLight: '#fff8e1', surface: '#f8fafc'
                    },
                    boxShadow: {
                        'floating': '0 10px 30px -5px rgba(251, 192, 45, 0.3)'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-200 flex justify-center h-screen font-sans text-rotiBrown selection:bg-rotiYellow">

    <div class="w-full max-w-md bg-surface h-full relative shadow-2xl flex flex-col overflow-hidden">
        
        <div class="flex-1 flex flex-col justify-center px-8 bg-rotiLight absolute inset-0 z-50">
            <div class="text-center mb-10 z-10">
                <div class="w-28 h-28 bg-rotiBrown rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-floating rotate-3">
                    <i class="fa-solid fa-bread-slice text-rotiYellow text-5xl -rotate-3"></i>
                </div>
                <h1 class="text-4xl font-extrabold text-rotiBrown tracking-tight">Ropi<span class="text-rotiYellow">HR</span></h1>
                <p class="text-rotiBrown opacity-80 mt-2 font-bold text-sm tracking-widest uppercase">Roti Bikin Hepi</p>
            </div>

            <form id="form-login" class="space-y-5 z-10 w-full">
                <div>
                    <div class="relative">
                        <i class="fa-regular fa-user absolute left-5 top-4 text-rotiBrown opacity-50 text-lg"></i>
                        <input type="email" id="email" placeholder="Email ERPNext" class="w-full bg-white border-2 border-transparent rounded-2xl py-4 pl-14 pr-4 text-lg focus:border-rotiYellow outline-none transition-all shadow-sm" required>
                    </div>
                </div>
                <div>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-5 top-4 text-rotiBrown opacity-50 text-lg"></i>
                        <input type="password" id="password" placeholder="Password" class="w-full bg-white border-2 border-transparent rounded-2xl py-4 pl-14 pr-4 text-lg focus:border-rotiYellow outline-none transition-all shadow-sm" required>
                    </div>
                </div>
                <button type="submit" id="btn-login" class="w-full bg-rotiYellow text-rotiBrown font-black text-xl py-4 rounded-2xl shadow-floating hover:scale-[1.02] transition-transform mt-8">
                    Mulai Bekerja
                </button>
            </form>
            <div class="absolute bottom-0 left-0 right-0 h-32 bg-rotiYellow rounded-t-[100%] opacity-20 -mb-10 pointer-events-none"></div>
        </div>

    </div>

    <script>
    const BACKEND = 'http://localhost:3333';

    // 1. Cek sesi
    if (localStorage.getItem('ropi_user')) {
        window.location.href = 'home.html';
    }

    // 2. Proses Login
    document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btn-login');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';
        btn.disabled = true;

        try {
            const res = await fetch(`${BACKEND}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const responsData = await res.json();

            // KITA CEK STATUS CODE DARI BACKEND ASLIMU (200)
            if (res.ok || responsData.statusCode === 200) {
                
                // ✨ INI KUNCI PERBAIKANNYA ✨
                // Kita ambil `responsData.data` sesuai dengan format Backend aslimu!
                localStorage.setItem('ropi_user', JSON.stringify(responsData.data));
                
                // Pindah ke Home
                window.location.href = 'home.html'; 
            } else {
                alert('❌ Login gagal! Email tidak terdaftar atau password salah.');
                btn.innerHTML = 'Mulai Bekerja';
                btn.disabled = false;
            }
        } catch (err) {
            console.error(err);
            alert('❌ Gagal terhubung ke Server HR. Pastikan Backend NestJS berjalan.');
            btn.innerHTML = 'Mulai Bekerja';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
