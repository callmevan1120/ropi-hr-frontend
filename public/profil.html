<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Roti Ropi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rotiBrown: '#3e2723', rotiYellow: '#fbc02d', rotiLight: '#fff8e1', surface: '#f8fafc'
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-surface flex justify-center h-screen font-sans text-rotiBrown selection:bg-rotiYellow">

    <div class="w-full max-w-md bg-surface h-full relative shadow-2xl flex flex-col overflow-hidden">
        
        <header class="pt-8 pb-4 px-6 bg-white border-b border-gray-100 flex items-center gap-4 sticky top-0 z-10 shrink-0">
            <a href="home.html" class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center text-rotiBrown hover:bg-gray-200 transition-all">
                <i class="fa-solid fa-arrow-left text-lg"></i>
            </a>
            <h2 class="text-2xl font-black text-rotiBrown">Profil Saya</h2>
        </header>

        <main class="flex-1 p-6 overflow-y-auto no-scrollbar">
            
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 text-center mb-6 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-rotiYellow"></div>
                
                <img id="prof-avatar" src="https://ui-avatars.com/api/?name=U&background=fbc02d&color=3e2723&size=128" 
                     class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-rotiLight shadow-sm">
                
                <h3 id="prof-nama" class="text-2xl font-black text-rotiBrown">Memuat...</h3>
                <p id="prof-role" class="text-gray-500 font-bold mb-2">-</p>
                <p class="text-sm bg-rotiLight text-rotiBrown px-3 py-1 rounded-full inline-block font-semibold">
                    ID: <span id="prof-id">-</span>
                </p>
            </div>

            <div class="bg-white rounded-3xl p-2 shadow-sm border border-gray-100 mb-8">
                <div class="p-4 border-b border-gray-50 flex items-center gap-4">
                    <div class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center shrink-0">
                        <i class="fa-regular fa-envelope text-gray-400 text-lg"></i>
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-0.5">Email Akses</p>
                        <p id="prof-email" class="font-bold text-rotiBrown truncate">-</p>
                    </div>
                </div>
            </div>

            <button onclick="prosesLogout()" class="w-full bg-red-50 text-red-600 font-black py-4 rounded-2xl border border-red-100 hover:bg-red-100 active:scale-95 transition-all flex justify-center items-center shadow-sm">
                <i class="fa-solid fa-arrow-right-from-bracket mr-2 text-lg"></i> Keluar (Logout)
            </button>
            
        </main>
    </div>

    <script>
        // 1. CEK LOGIN (Keamanan)
        const userDataString = localStorage.getItem('ropi_user');
        if (!userDataString) {
            // Jika tidak ada data memori, tendang kembali ke halaman Login
            window.location.href = 'index.html';
        } else {
            // 2. TAMPILKAN DATA DINAMIS
            const user = JSON.parse(userDataString);
            
            document.getElementById('prof-nama').textContent = user.name || 'Karyawan';
            document.getElementById('prof-role').textContent = user.role || 'Staff Roti Ropi';
            document.getElementById('prof-id').textContent   = user.employee_id || 'Belum Terhubung';
            document.getElementById('prof-email').textContent = user.email || '-';
            
            // Buat inisial untuk Avatar
            const inisial = (user.name || 'K').charAt(0).toUpperCase();
            document.getElementById('prof-avatar').src = `https://ui-avatars.com/api/?name=${inisial}&background=fbc02d&color=3e2723&size=128&bold=true`;
        }

        // 3. FUNGSI LOGOUT (Menghapus Ingatan Browser)
        function prosesLogout() {
            // Tampilkan konfirmasi agar tidak tidak sengaja terpencet
            const yakin = confirm('Apakah Anda yakin ingin keluar dari RopiHR?');
            
            if (yakin) {
                // KUNCI UTAMA: Hapus data sesi dari localStorage
                localStorage.removeItem('ropi_user');
                
                // Hapus juga cache data lain jika ada (opsional tapi disarankan)
                localStorage.removeItem('ropi_status_absen');
                
                // Lempar kembali ke halaman Login (index.html)
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
