<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RopiHR — Informasi Cuti</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        coklat: '#3e2723', kuning: '#fbc02d', krem: '#fff8e1'
      }}}
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen font-sans">
<div class="w-full max-w-sm bg-white min-h-screen flex flex-col shadow-2xl relative">

  <div class="bg-coklat pt-12 pb-6 px-6 shrink-0">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="home.html" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-white">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 class="text-xl font-black text-kuning">Informasi Cuti</h1>
      </div>
      <div class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-white">
        <i class="fa-solid fa-calendar-check"></i>
      </div>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto no-scrollbar pb-32">

    <div class="px-6 pt-5">
      <h3 class="font-black text-coklat text-base mb-3">Sisa Kuota Cuti</h3>
      <div class="flex gap-4 overflow-x-auto no-scrollbar pb-2">
        <div class="min-w-[140px] bg-white p-5 rounded-3xl shadow-sm border border-gray-100 text-center relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-1.5 bg-kuning"></div>
          <div class="w-16 h-16 rounded-full border-[5px] border-kuning flex flex-col items-center justify-center mx-auto mb-2 mt-1">
            <span id="sisa-cuti" class="text-lg font-black text-coklat">-</span>
          </div>
          <p class="text-[10px] font-black text-gray-400 uppercase tracking-wide">Cuti Tahunan</p>
        </div>
      </div>
      <p class="mt-3 text-[10px] text-gray-400 leading-relaxed italic">
        * Jika ada ketidaksesuaian jatah atau ingin mengajukan cuti/izin sakit, harap hubungi bagian HRD.
      </p>
    </div>

    <div class="px-6 mt-8">
      <h3 class="font-black text-coklat text-base mb-4">Riwayat & Status</h3>
      <div id="list-pengajuan" class="flex flex-col gap-3">
        <div class="bg-gray-50 rounded-2xl p-6 text-center text-gray-400">
          <div class="w-6 h-6 border-2 border-gray-300 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
          <p class="text-sm font-bold">Sinkronisasi data...</p>
        </div>
      </div>
    </div>

  </div>

  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-sm bg-white border-t border-gray-100 px-6 py-3 flex justify-around z-20">
    <a href="home.html" class="flex flex-col items-center text-gray-300 gap-0.5 hover:text-coklat transition-colors">
      <i class="fa-solid fa-house text-xl"></i>
      <span class="text-[10px] font-black">Home</span>
    </a>
    <a href="absen.html" class="flex flex-col items-center text-gray-300 gap-0.5 hover:text-coklat transition-colors">
      <i class="fa-solid fa-clipboard-user text-xl"></i>
      <span class="text-[10px] font-black">Absen</span>
    </a>
    <a href="cuti.html" class="flex flex-col items-center text-coklat gap-0.5">
      <i class="fa-solid fa-calendar-minus text-xl"></i>
      <span class="text-[10px] font-black">Cuti</span>
    </a>
    <a href="#" onclick="alert('Fitur Klaim Dana sedang dalam tahap pengembangan! 🚀'); return false;" class="flex flex-col items-center text-gray-200 gap-0.5">
      <i class="fa-solid fa-wallet text-xl"></i>
      <span class="text-[10px] font-black">Klaim</span>
    </a>
    <a href="#" onclick="alert('Fitur Slip Gaji sedang dalam tahap pengembangan! 🚀'); return false;" class="flex flex-col items-center text-gray-200 gap-0.5">
      <i class="fa-solid fa-money-check-dollar text-xl"></i>
      <span class="text-[10px] font-black">Gaji</span>
    </a>
  </nav>

</div>

<script>
const BACKEND = 'http://localhost:3333';
const user = JSON.parse(localStorage.getItem('ropi_user'));

if (!user) window.location.href = 'index.html';

async function muatDataCuti() {
  const listEl = document.getElementById('list-pengajuan');
  try {
    const res = await fetch(`${BACKEND}/api/leaves?employee_id=${encodeURIComponent(user.employee_id)}`);
    const data = await res.json();

    if (data.success) {
      // 1. Update Riwayat
      if (data.history && data.history.length > 0) {
        listEl.innerHTML = data.history.map(item => {
          let statusStyle = 'bg-yellow-100 text-yellow-700';
          if (item.status === 'Approved') statusStyle = 'bg-green-100 text-green-700';
          if (item.status === 'Rejected') statusStyle = 'bg-red-100 text-red-700';

          return `
            <div class="bg-white p-4 rounded-2xl border border-gray-100 flex flex-col gap-1 shadow-sm transition-all active:scale-95">
              <div class="flex justify-between items-start">
                <div>
                  <p class="font-black text-coklat text-sm">${item.leave_type}</p>
                  <p class="text-[10px] text-gray-400 font-bold">${item.from_date} s/d ${item.to_date}</p>
                </div>
                <span class="${statusStyle} text-[9px] px-2 py-0.5 rounded-full font-black uppercase tracking-tighter">${item.status}</span>
              </div>
              ${item.reason ? `<p class="text-[10px] text-gray-500 mt-1 border-t border-gray-50 pt-2 italic">"${item.reason}"</p>` : ''}
            </div>
          `;
        }).join('');
      } else {
        listEl.innerHTML = '<div class="bg-gray-50 rounded-2xl p-6 text-center text-gray-400 font-bold text-sm">Belum ada riwayat cuti tercatat.</div>';
      }

      // 2. Update Jatah Sisa Cuti
      document.getElementById('sisa-cuti').textContent = data.balance || '0';
    }
  } catch (err) {
    listEl.innerHTML = '<div class="text-center text-red-400 text-xs font-bold py-10">Gagal terhubung ke server.</div>';
  }
}

window.addEventListener('load', muatDataCuti);
</script>
</body>
</html>
